name: Feature request
description: Suggest a new capability or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check the [milestone status table in the README](../blob/main/README.md) and the per-milestone plans in [`docs/superpowers/plans/`](../tree/main/docs/superpowers/plans). The feature you want may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The user-facing or workflow problem. Don't lead with the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea, describe it. If you don't, that's fine — describe the problem and we'll discuss approaches.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the problem, including "do nothing".

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - Daemon / IPC
        - macOS tray
        - Windows tray
        - Linux tray
        - MCP tools
        - OAuth / providers
        - Documentation
        - CI / release tooling
