name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: install libdbus-1-dev (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        # Note: --all-features deliberately omitted because the `keychain-tests`
        # feature in mail-mcp-core requires a running OS keychain (Keychain on
        # macOS, gnome-keyring/kwallet on Linux). Linux runners don't have one.
        # `keychain-tests` is for manual local verification.
        run: cargo test --workspace
      - name: install xcodegen (macOS only)
        if: runner.os == 'macOS'
        run: brew install xcodegen
      - name: write stub Config-Local.xcconfig (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          cp Config-Default.xcconfig Config-Local.xcconfig
          # build-daemon.sh and the build phase don't actually need a valid OAuth
          # client_id at compile time — only the daemon at runtime does. CI just
          # needs the build setting to be defined.
          printf 'MAIL_MCP_GOOGLE_CLIENT_ID = ci-dummy.apps.googleusercontent.com\n' >> Config-Local.xcconfig
      - name: xcodegen generate (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: xcodegen generate
      - name: xcodebuild test (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          xcodebuild test \
            -scheme MailMCP \
            -destination "platform=macOS" \
            -only-testing:MailMCPTests \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
