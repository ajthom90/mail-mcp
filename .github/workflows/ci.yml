name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: install libdbus-1-dev (Linux only)
        if: runner.os == 'Linux'
        # apt-get update sometimes hits a stale mirror — retry up to 3x.
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update; then break; fi
            echo "apt-get update attempt $attempt failed; sleeping 10s"
            sleep 10
          done
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        # Note: --all-features deliberately omitted because the `keychain-tests`
        # feature in mail-mcp-core requires a running OS keychain (Keychain on
        # macOS, gnome-keyring/kwallet on Linux). Linux runners don't have one.
        # `keychain-tests` is for manual local verification.
        run: cargo test --workspace
      - name: write stub Config-Local.xcconfig (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          cp Config-Default.xcconfig Config-Local.xcconfig
          # build-daemon.sh and the build phase don't actually need a valid OAuth
          # client_id at compile time — only the daemon at runtime does. CI just
          # needs the build setting to be defined.
          printf 'MAIL_MCP_GOOGLE_CLIENT_ID = ci-dummy.apps.googleusercontent.com\n' >> Config-Local.xcconfig
      # Note: MailMCP.xcodeproj is checked in (xcodegen prebuilts crash on the
      # macos-15 runner; project.yml is still the source of truth — devs run
      # `xcodegen generate` locally when project.yml changes).
      - name: xcodebuild test (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          xcodebuild test \
            -scheme MailMCP \
            -destination "platform=macOS" \
            -only-testing:MailMCPTests \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
      - name: xcodebuild UI test (macOS only)
        if: runner.os == 'macOS'
        # UI test is flaky in CI (spawning a daemon under XCUIApplication
        # triggers sandbox/permission edges that don't repro locally). Run
        # it but don't fail the job — track green-or-flake over time.
        continue-on-error: true
        working-directory: tray-app
        run: |
          xcodebuild test \
            -scheme MailMCP \
            -destination "platform=macOS" \
            -only-testing:MailMCPUITests/WizardSmokeTests \
            CODE_SIGNING_ALLOWED=NO

  cross-compile:
    name: Cross-compile ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel cross-compiled from arm64 host.
          - os: macos-15
            target: x86_64-apple-darwin
          # Linux arm64 cross-compiled from amd64 host.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker_pkg: gcc-aarch64-linux-gnu
            linker_bin: aarch64-linux-gnu-gcc
          # Linux RISC-V (riscv64gc) cross-compiled from amd64 host.
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            linker_pkg: gcc-riscv64-linux-gnu
            linker_bin: riscv64-linux-gnu-gcc
          # Windows amd64 (host on the windows-latest runner).
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows arm64 (cross-compile from amd64 windows-latest).
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: rustup target add ${{ matrix.target }}
        # The workspace pins to 1.88 via rust-toolchain.toml, so the
        # rust-toolchain action's `targets:` input (which adds to stable)
        # doesn't help. Install the target for the pinned toolchain.
        run: rustup target add ${{ matrix.target }}
      - name: install cross linker + libdbus dev (Linux targets)
        if: runner.os == 'Linux'
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update; then break; fi
            sleep 10
          done
          sudo apt-get install -y pkg-config libdbus-1-dev ${{ matrix.linker_pkg }}
      - name: configure cross linker (Linux targets)
        if: runner.os == 'Linux'
        run: |
          # Tell cargo which linker to use for the cross target.
          TARGET_UPPER=$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ matrix.linker_bin }}" >> "$GITHUB_ENV"
          # libdbus-sys (transitive via keyring) needs to find dbus headers/libs
          # for the *target* arch. Without a true sysroot we fall back to telling
          # pkg-config the system has dbus installed; this is enough for `cargo check`
          # to type-check, though a full link will require a target-arch sysroot.
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}
      - name: cargo check --workspace --target ${{ matrix.target }}
        run: cargo check --workspace --target ${{ matrix.target }}

  # Builds + tests the .NET 8 / WinUI 3 tray app on a Windows runner. The
  # csproj has a BuildDaemon target that invokes cargo for the daemon binary,
  # so this job exercises the cargo→.NET integration end-to-end.
  windows-tray:
    name: Windows tray (${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]
        # arm64 cross-build is supported by the project, but xunit.runner.visualstudio
        # doesn't ship arm64 hosts, so we only RUN tests on x64. The arm64 build
        # gets covered by the `Cross-compile aarch64-pc-windows-msvc` job.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: rustup target add x86_64-pc-windows-msvc
        # The workspace pins 1.88; install the target for that toolchain.
        run: rustup target add x86_64-pc-windows-msvc
      - name: setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-tray-${{ matrix.platform }}
      - name: dotnet restore
        working-directory: tray-app-win
        run: dotnet restore MailMCP.sln /p:Platform=${{ matrix.platform }}
      - name: dotnet build
        working-directory: tray-app-win
        run: dotnet build MailMCP.sln -c Debug -p:Platform=${{ matrix.platform }} --no-restore
      - name: dotnet test
        working-directory: tray-app-win
        run: dotnet test MailMCP.Tests/MailMCP.Tests.csproj -c Debug -p:Platform=${{ matrix.platform }} --no-build --logger "console;verbosity=normal"
