name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: install libdbus-1-dev (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        # Note: --all-features deliberately omitted because the `keychain-tests`
        # feature in mail-mcp-core requires a running OS keychain (Keychain on
        # macOS, gnome-keyring/kwallet on Linux). Linux runners don't have one.
        # `keychain-tests` is for manual local verification.
        run: cargo test --workspace
      - name: install xcodegen 2.44.0 (macOS only)
        if: runner.os == 'macOS'
        # Homebrew currently ships 2.45.x which segfaults on macos-14 runners
        # while generating the project. Pin to 2.44.0 by fetching the release
        # zip directly and using its bundled install.sh.
        run: |
          curl -fsSL -o /tmp/xcodegen.zip \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.44.0/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/
          sudo bash /tmp/xcodegen/install.sh /usr/local
          xcodegen --version
      - name: write stub Config-Local.xcconfig (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          cp Config-Default.xcconfig Config-Local.xcconfig
          # build-daemon.sh and the build phase don't actually need a valid OAuth
          # client_id at compile time — only the daemon at runtime does. CI just
          # needs the build setting to be defined.
          printf 'MAIL_MCP_GOOGLE_CLIENT_ID = ci-dummy.apps.googleusercontent.com\n' >> Config-Local.xcconfig
      - name: xcodegen generate (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: xcodegen generate
      - name: xcodebuild test (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        run: |
          xcodebuild test \
            -scheme MailMCP \
            -destination "platform=macOS" \
            -only-testing:MailMCPTests \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
      - name: xcodebuild UI test (macOS only)
        if: runner.os == 'macOS'
        working-directory: tray-app
        # Note: this UI test launches the app in a tempdir. The daemon needs a
        # MAIL_MCP_GOOGLE_CLIENT_ID at runtime, but the wizard's "Skip Setup"
        # path doesn't actually call OAuth so a stub client_id is fine.
        run: |
          xcodebuild test \
            -scheme MailMCP \
            -destination "platform=macOS" \
            -only-testing:MailMCPUITests/WizardSmokeTests \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
